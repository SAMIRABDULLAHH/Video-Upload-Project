<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البحث عن المقاطع - الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-2xl border border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-400">نظام استعراض المقاطع الخاص</h1>
            <a href="/dashboard" class="text-sm text-indigo-400 hover:underline">لوحة التحكم ←</a>
        </div>
        <form action="/search" method="post" class="flex gap-2 mb-6">
            <input type="text" name="video_id" placeholder="أدخل رقم المقطع (ID)..." required class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white text-center font-mono text-lg tracking-wider">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 px-6 py-3 rounded-xl font-bold transition">بحث</button>
        </form>
        {% if error %}
            <div class="p-4 bg-red-950/50 border border-red-500/40 rounded-xl text-red-400 text-center font-semibold mb-4">{{ error }}</div>
        {% endif %}
        {% if video_path %}
            <div class="mt-4 border border-slate-700 rounded-xl p-4 bg-slate-850">
                <p class="text-sm text-slate-400 mb-3 text-center">معاينة المقطع رقم: <span class="font-mono text-indigo-400 font-bold text-lg">{{ video_id }}</span></p>
                <video controls class="w-full rounded-xl border border-slate-600 shadow-2xl bg-black">
                    <source src="{{ video_path }}" type="video/mp4">
                </video>
            </div>
        {% endif %}
    </div>
</body>
</html>
