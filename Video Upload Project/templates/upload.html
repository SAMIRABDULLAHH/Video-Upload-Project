<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز رفع المقاطع الآمن</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md text-center border border-slate-700">
        <h1 class="text-2xl font-bold mb-2 text-indigo-400">منصة رفع المقاطع الخاص</h1>
        <p class="text-slate-400 text-sm mb-6">ارفع المقطع واحصل على رقم المعاينة فوراً</p>
        <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-4">
            <div class="border-2 border-dashed border-slate-600 rounded-xl p-6 hover:border-indigo-500 cursor-pointer transition bg-slate-850">
                <input type="file" name="file" accept="video/*" required class="block w-full text-sm text-slate-400 file:ml-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-lg">رفع المقطع الآن</button>
        </form>
        {% if video_id %}
        <div class="mt-6 p-4 bg-emerald-950/80 border border-emerald-500/50 rounded-xl">
            <p class="text-sm text-emerald-400 font-semibold">تم الرفع بنجاح! رقم المقطع هو:</p>
            <p class="text-3xl font-mono font-bold tracking-wider text-white mt-2 bg-slate-900/50 py-2 rounded-lg border border-slate-700">{{ video_id }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
